[unstable]
build-std-features = ["compiler-builtins-mem"]
build-std = ["core", "compiler_builtins"]

[build]
target = "x86_64-quay-kernel.json"

[target.x86_64-quay-kernel]
rustflags = [
    "-C", "link-arg=-Tlinker.ld",
    "-C", "link-arg=-z",
    "-C", "link-arg=max-page-size=0x1000"
]
